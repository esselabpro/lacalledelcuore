<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Giornalino - La Calle del Cuore</title>
    <!-- QUESTA RIGA QUI SOTTO È QUELLA CHE MANCAVA! -->
    <link rel="stylesheet" href="css/Style.css">
</head>

<body>

    <!-- Copia qui la tua barra di navigazione uguale a quella dell'index -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">La Calle del Cuore</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="assets/archivio/ultimogiornalino.pdf" target="_blank">Il Giornalino</a></li>
                <li><a href="storia.html">La Storia</a></li>
                <li><a href="statuto.html">Statuto</a></li>
                <li><a href="contatti.html">Contatti</a></li>
            </ul>
        </div>
    </nav>

    <main class="home-container" style="padding-top: 50px;">
        <h2>Archivio Storico dei Giornalini</h2>
        <p>Qui puoi trovare tutte le edizioni passate del nostro notiziario.</p>

        <ul id="lista-archivio" class="archive-list">
        </ul>
    </main>

    <script>
        // Carica i dati dal file JSON che hai messo nella cartella data
        fetch('data/archivio.json')
            .then(response => response.json())
            .then(data => {
                const lista = document.getElementById('lista-archivio');
                data.forEach(item => {
                    const li = document.createElement('li');
                    // Crea il link usando i dati dal JSON
                    li.innerHTML = `${item.titolo}: <a href="assets/archivio/storico/${item.file}" target="_blank">Scarica il PDF</a>`;
                    lista.appendChild(li);
                });
            })
            .catch(error => {
                console.error("Errore nel caricamento:", error);
                document.getElementById('lista-archivio').innerHTML = "<li>Errore nel caricamento dei dati.</li>";
            });
    </script>
   
    <footer class="footer">

    </footer>

</body>
